# Codecov configuration for atom
# Documentation: https://docs.codecov.io/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  max_report_age: 24h
  notify:
    after_n_builds: 1
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        threshold: 1%
        target: 70%
        base: auto
        if_ci_failed: error
        if_not_found: error
        informational: false
        only_pulls: false

      core:
        target: 80%
        threshold: 1%
        paths:
          - "!*_test.go"
        if_ci_failed: error

    patch:
      default:
        target: 80%
        threshold: 0%
        base: auto
        if_ci_failed: error
        if_not_found: error
        informational: false
        only_pulls: true

ignore:
  - "**/*_test.go"
  - "**/mock_*.go"
  - "**/testdata/**"
  - "docs/**"
  - ".github/**"
  - "vendor/**"

comment:
  layout: "reach,diff,flags,tree,betaprofiling"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_carryforward_flags: true
  show_critical_paths: true
  after_n_builds: 1

component_management:
  individual_components:
    - component_id: atomizer
      name: Atomizer Core
      paths:
        - "atomizer.go"
        - "!*_test.go"

    - component_id: api
      name: API Types
      paths:
        - "api.go"
        - "!*_test.go"

    - component_id: encoding
      name: Encoding Utilities
      paths:
        - "encoding.go"
        - "!*_test.go"

flags:
  unit:
    paths:
      - "*.go"
      - "!*_test.go"
    carryforward: true

github_checks:
  annotations: true

parsers:
  go:
    partials_as_hits: true

uploads:
  disable_default_path_fixes: false
